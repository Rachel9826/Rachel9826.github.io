<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HTML5 Canvas 打砖块游戏</title>
    <style>
        /* CSS: 控制网页样式 */
        body {
            background-color: #222; /* 背景色 */
            display: flex;          /* 使用弹性布局居中画布 */
            justify-content: center;
            align-items: center;
            height: 100vh;          /* 高度占满整个视口 */
            margin: 0;              /* 移除默认边距 */
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #eee; /* 游戏画布背景色 */
            border: 2px solid #444; /* 画布边框 */
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* 添加阴影效果 */
        }
    </style>
</head>
<body>

<!-- HTML: 游戏画布 -->
<canvas id="gameCanvas" width="480" height="320"></canvas>

<script>
// JavaScript: 游戏逻辑
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- 游戏变量定义 ---

// 球的属性
let x = canvas.width / 2;
let y = canvas.height - 30;
let dx = 2; // 水平速度
let dy = -2; // 垂直速度
const ballRadius = 10;

// 挡板的属性
const paddleHeight = 10;
const paddleWidth = 75;
let paddleX = (canvas.width - paddleWidth) / 2;

// 按键状态
let rightPressed = false;
let leftPressed = false;

// 砖块的属性
const brickRowCount = 3;
const brickColumnCount = 5;
const brickWidth = 75;
const brickHeight = 20;
const brickPadding = 10;
const brickOffsetTop = 30;
const brickOffsetLeft = 30;

// 初始化砖块数组
const bricks = [];
for(let c=0; c<brickColumnCount; c++) {
    bricks[c] = [];
    for(let r=0; r<brickRowCount; r++) {
        bricks[c][r] = { x: 0, y: 0, status: 1 }; // status为1表示砖块存在
    }
}

// --- 事件监听 ---

document.addEventListener("keydown", keyDownHandler, false);
document.addEventListener("keyup", keyUpHandler, false);
document.addEventListener("mousemove", mouseMoveHandler, false);

function keyDownHandler(e) {
    if(e.key == "Right" || e.key == "ArrowRight") {
        rightPressed = true;
    }
    else if(e.key == "Left" || e.key == "ArrowLeft") {
        leftPressed = true;
    }
}

function keyUpHandler(e) {
    if(e.key == "Right" || e.key == "ArrowRight") {
        rightPressed = false;
    }
    else if(e.key == "Left" || e.key == "ArrowLeft") {
        leftPressed = false;
    }
}

function mouseMoveHandler(e) {
    const relativeX = e.clientX - canvas.offsetLeft;
    if(relativeX > 0 && relativeX < canvas.width) {
        paddleX = relativeX - paddleWidth / 2;
    }
}

// --- 碰撞检测 ---

function collisionDetection() {
    for(let c=0; c<brickColumnCount; c++) {
        for(let r=0; r<brickRowCount; r++) {
            const b = bricks[c][r];
            if(b.status == 1) {
                if(x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                    dy = -dy;
                    b.status = 0; // 击中后砖块消失
                }
            }
        }
    }
}

// --- 绘图函数 ---

function drawBall() {
    ctx.beginPath();
    ctx.arc(x, y, ballRadius, 0, Math.PI*2);
    ctx.fillStyle = "#0095DD";
    ctx.fill();
    ctx.closePath();
}

function drawPaddle() {
    ctx.beginPath();
    ctx.rect(paddleX, canvas.height-paddleHeight, paddleWidth, paddleHeight);
    ctx.fillStyle = "#0095DD";
    ctx.fill();
    ctx.closePath();
}

function drawBricks() {
    for(let c=0; c<brickColumnCount; c++) {
        for(let r=0; r<brickRowCount; r++) {
            if(bricks[c][r].status == 1) {
                const brickX = (c*(brickWidth+brickPadding))+brickOffsetLeft;
                const brickY = (r*(brickHeight+brickPadding))+brickOffsetTop;
                bricks[c][r].x = brickX;
                bricks[c][r].y = brickY;
                ctx.beginPath();
                ctx.rect(brickX, brickY, brickWidth, brickHeight);
                ctx.fillStyle = "#0095DD";
                ctx.fill();
                ctx.closePath();
            }
        }
    }
}

// --- 主游戏循环 ---

function draw() {
    // 1. 清空画布
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 2. 绘制所有元素
    drawBricks();
    drawBall();
    drawPaddle();
    
    // 3. 执行逻辑计算
    collisionDetection();

    // 4. 更新球的位置
    // 碰到左右墙壁反弹
    if(x + dx > canvas.width-ballRadius || x + dx < ballRadius) {
        dx = -dx;
    }
    // 碰到顶部反弹
    if(y + dy < ballRadius) {
        dy = -dy;
    } 
    // 检查是否碰到底部（即挡板）
    else if(y + dy > canvas.height-ballRadius) {
        // 检查是否在挡板的横向范围内
        if(x > paddleX && x < paddleX + paddleWidth) {
            dy = -dy;
            // 可选：增加一点速度以增加难度
            // dx = dx * 1.1; dy = dy * 1.1; 
        }
        else {
            // 游戏结束
            alert("游戏结束！");
            document.location.reload(); // 重新加载页面以重新开始
        }
    }

    // 更新坐标
    x += dx;
    y += dy;

    // 移动挡板
    if(rightPressed && paddleX < canvas.width-paddleWidth) {
        paddleX += 7;
    }
    else if(leftPressed && paddleX > 0) {
        paddleX -= 7;
    }

    // 5. 请求下一帧动画
    requestAnimationFrame(draw);
}

// 启动游戏
draw();

</script>

</body>
</html>
